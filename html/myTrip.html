<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trip place</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/myTrip.css">
</head>

<body class="sub-page">
  <div class="container">
    <header class="sub-header">
      <h1 class="page-title">
        나의 여행 앨범
      </h1>
    </header>
    <main class="sub-content trip-content">
      <section class="trip-section page-section">
        <audio controls autoplay>
          <source src="../assets/audio1.mp3" type="audio/mp3" />
          <source src="../assets/audio2.mp3" type="audio/mp3" />
          당신의 브라우저는 오디오 플레이어를 재생할 수 없습니다.
        </audio>
      </section>
      <section class="trip-section page-section">
        <div class="album">
          <div class="trip-card-box">
            <div class="trip-card">
              <div class="trip-card-front">
                <img src="../assets/Image1.JPG" alt="대구 시크릿 카페 사진">
              </div>
              <div class="trip-card-back trip-back1">
                <div class="trip-card-dark"></div>
                <div class="trip-card-info">
                  <h3>대구 시크릿 카페</h3>
                  <p>방문 연도: 2026년</p>
                  <p>커피와 함께 즐길 수 있는 경치</p>
                </div>
              </div>
            </div>
          </div>
          <div class="trip-card-box">
            <div class="trip-card">
              <div class="trip-card-front">
                <img src="../assets/Image2.JPG" alt="포항 사진">
              </div>
              <div class="trip-card-back trip-back2">
                <div class="trip-card-dark"></div>
                <div class="trip-card-info">
                  <h3>포항 바다</h3>
                  <p>방문 연도: 2025년</p>
                  <p>낚시를 하러 배타면서 찍은 경치</p>
                </div>
              </div>
            </div>
          </div>
          <div class="trip-card-box">
            <div class="trip-card">
              <div class="trip-card-front">
                <img src="../assets/Image3.JPEG" alt="도쿄 사진">
              </div>
              <div class="trip-card-back trip-back3">
                <div class="trip-card-dark"></div>
                <div class="trip-card-info">
                  <h3>도쿄 온천</h3>
                  <p>방문 연도: 2019년</p>
                  <p>도쿄의 어느 한 온천 내부 사진</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="trip-section page-section">
        <h2>🎥 나의 여행 브이로그</h2>
        <div class="video-section">
          <div class="video-wrapper">
            <video width="200" autoplay muted loop>
              <source src="../assets/Video1.MP4" type="video/mp4">
            </video>
            <p class="video-text">산책중...</p>
          </div>
        </div>
      </section>
    </main>
  </div>
  <button id="home-button" type="button" onclick="location.href='/index.html'">🏠</button>
</body>

</html>
