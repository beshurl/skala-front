<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatchButton</title>
	<link rel="stylesheet" href="../css/style.css">

</head>

<body>
  <button id="escapeButton">클릭해 봐!</button>

  <script>
    const escapeButton = document.querySelector("#escapeButton");

    escapeButton.addEventListener("mouseenter", () => {
      const buttonWidth = escapeButton.offsetWidth;
      const buttonHeight = escapeButton.offsetHeight;

      const maxX = window.innerWidth - buttonWidth;
      const maxY = window.innerHeight - buttonHeight;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      escapeButton.style.left = `${randomX}px`;
      escapeButton.style.top = `${randomY}px`;
      escapeButton.style.transform = "none";
    });
  </script>
</body>
</html>
