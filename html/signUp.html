<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SignUp</title>
	<link rel="stylesheet" href="../css/style.css">
</head>

<body class="sub-page">
	<div class="container">
		<header class="sub-header">
			<h1 class="page-title">회원가입</h1>
			<p>SKALA-FRONT 회원가입을 환영합니다.</p>
		</header>
		<main class="sub-content signup-content page-section">
		<form action="signUpResult.html" method="get">
			<fieldset>
				<legend>계정 정보</legend>
				<p>
					<label for="userId">아이디: </label>
					<input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫지">
					<small>(필수)</small>
				</p>
				<p>
					<label for="userPw">비밀번호: </label>
					<input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
					<small>(필수)</small>
				</p>
				<p>
					<label for="useEmail">이메일: </label>
					<input type="text" id="userEmail" name="userEmail" placeholder="example">
					@
					<select name="emailDomain">
						<option value="direct">직접 입력</option>
						<option value="naver.com">naver.com</option>
						<option value="gamil.com">gmail.com</option>
					</select>
				</p>
			</fieldset>
			<fieldset>
				<legend>개인 프로필 정보</legend>
				<p>
					<label for="name">이름: </label>
					<input type="text" id="name" name="name">
				</p>
				<p>
					<label for="userBrith">생년월일:</label>
					<input type="date" id="userBrith" name="userBrith">
				</p>
				<p>
					성별:
					<label><input type="radio" name="gender" value="male" checked> 남성</label>
					<label><input type="radio" name="gender" value="female"> 여성</label>
					<label><input type="radio" name="gender" value="none"> 선택안함</label>
				</p>
				<p>
					관심분야 (중복선택 가능):<br>
					<label><input type="checkbox" name="interest" value="frontend">웹 프론트엔드(vue.js/HTML)</label><br>
					<label><input type="checkbox" name="interest" value="UIUX">UI/UX 디자인 표준</label><br>
					<label><input type="checkbox" name="interest" value="backend">백엔드 & 데이터베이스</label><br>
					<label><input type="checkbox" name="interest" value="cloud">클라우드 & 인프라</label>
				</p>
				<p>가입 경로:
					<select name="path">
						<option>-- 선택해주세요 --</option>
						<option value="search">검색</option>
						<option value="friend">지인소개</option>
						<option value="guitar">기타</option>
					</select>
				</p>
			</fieldset>
			<fieldset>
				<legend>자기 소개</legend>
				<p>
					<label for="intro">나를 표현하는 한줄 소개 또는 가입 인사:</label><br>
					<textarea cols="50" rows="5" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
				</p>
			</fieldset>
			<div class="form-button">
				<input type="submit" class="btn-submit" value="동의하고 회원가입">
				<input type="reset" class="btn-reset" value="다시 작성">
			</div>
		</form>
		</main>
		<button id="home-button" type="button" onclick="location.href='/index.html'">🏠</button>
	</div>
	<script src="../script/signUp.js"></script>
</body>

</html>
